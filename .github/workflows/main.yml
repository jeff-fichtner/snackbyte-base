# Validate, version, and tag on main.
#
# Every app spun up from this template inherits this workflow — the release flow is the
# same everywhere: GitHub-hosted, npm, a quality gate, and a tag as the deploy signal.
#
# - On a PR to main: run the quality gate as a merge gate. A PR can't merge unless
#   `npm run check:all` passes.
# - On a push to main: run the gate again (independent certification at tag time), then
#   (if AUTO_BUMP) auto-increment the patch version, commit it with [skip ci] (so the
#   commit doesn't re-trigger this workflow), and push a `vX.Y.Z` tag.
#
# A `vX.Y.Z` tag therefore means: this commit passed checks and is deployable. Hosts
# (e.g. a Cloud Build trigger) watch for the tag and deploy. Bump minor/major by hand
# (`npm version minor`) for meaningful releases; CI only auto-bumps the patch.
#
# AUTO_BUMP ships 'false' and the spin-up resolver flips it to 'true'. That single flag
# does two things: (1) it's why a freshly-instantiated app's "Initial commit" — a push to
# main that fires before init has run — can't prematurely tag the template's version onto
# the app; and (2) it's why this template repo doesn't auto-tag on every push. The
# template still runs its tests and merge gate automatically; it just cuts version tags
# on demand (`npm version patch && git push --follow-tags`) instead of per-push.
#
# ── Configure per app ──────────────────────────────────────────────────────────────
# These are the only knobs. Change them here; the logic below reads them. (Deploy
# target — region, service, project — lives with deploy, not here: see DEPLOY.md.)
env:
  NODE_VERSION: '24' # Node major used for the gate and bump (keep aligned with .nvmrc)
  AUTO_BUMP: 'false' # 'true': auto patch-bump + tag on push to main. 'false': gate only. (init sets 'true')
# ───────────────────────────────────────────────────────────────────────────────────

name: main

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Merge gate: PRs must pass the quality gate before they can merge.
  validate:
    name: validate (merge gate)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run check:all

  # Tag gate: on push to main, re-certify, then (if enabled) version + tag.
  version-and-tag:
    name: version and tag
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version-bump commit and the tag
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run check:all

      - name: Configure git
        if: env.AUTO_BUMP == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Auto-increment patch version
        if: env.AUTO_BUMP == 'true'
        id: bump
        run: |
          npm version patch --no-git-tag-version
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $VERSION"

      - name: Commit and tag
        if: env.AUTO_BUMP == 'true'
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          TAG="v$VERSION"
          # [skip ci] keeps this commit from re-triggering the workflow (no loop).
          git add package.json package-lock.json
          git commit -m "chore: release $TAG [skip ci]"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin HEAD:main
          git push origin "$TAG"
          echo "Tagged $TAG"
