installed:
- agent-context
- git-commit
- git-specify-branch
- specify-review-loop
- analyze-autofix
settings:
  auto_execute_hooks: true
hooks:
  before_specify:
  - extension: git-specify-branch
    command: speckit.git.specify-branch
    enabled: true
    optional: true
    priority: 10
    prompt: Clean the working area and switch to the feature branch before specifying?
    description: Ensure a clean working area and feature branch before specifying
    condition: null
  before_implement:
  - extension: git-commit
    command: speckit.git.commit
    enabled: true
    optional: true
    priority: 10
    prompt: Commit this feature's spec artifacts before implementing?
    description: Checkpoint the feature's spec artifacts before implementation
    condition: null
  after_specify:
  - extension: specify-review-loop
    command: speckit.specify.review-loop
    enabled: true
    optional: false
    priority: 5
    prompt: Recursively review the spec and fix unambiguous issues?
    description: Recursively review the spec and fix unambiguous issues (runs before clarify)
    condition: null
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    priority: 10
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after specification
    condition: null
  - extension: core
    command: speckit.clarify
    enabled: true
    optional: false
    priority: 20
    prompt: Clarify underspecified areas in the spec?
    description: Automatically clarify the spec after specification
    condition: null
  after_tasks:
  - extension: core
    command: speckit.analyze
    enabled: true
    optional: false
    priority: 20
    prompt: Analyze cross-artifact consistency after tasks?
    description: Automatically analyze consistency after task generation
    condition: null
  after_implement:
  - extension: core
    command: speckit.converge
    enabled: true
    optional: false
    priority: 20
    prompt: Converge the codebase against spec, plan, and tasks?
    description: Automatically converge after implementation
    condition: null
  after_analyze:
  - extension: analyze-autofix
    command: speckit.analyze.autofix
    enabled: true
    optional: true
    priority: 10
    prompt: Apply unambiguous analysis fixes and re-present the results?
    description: Apply unambiguous analysis fixes and re-present results
    condition: null
  after_plan:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    priority: 10
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after planning
    condition: null
  - extension: core
    command: speckit.tasks
    enabled: true
    optional: false
    priority: 20
    prompt: Generate tasks.md from the plan?
    description: Automatically generate tasks after planning
    condition: null
